<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <!-- Road -->
  <rect x="0" y="130" width="320" height="30" fill="#1a0030" rx="4"/>
  <rect x="20" y="143" width="40" height="5" fill="#e91e8c" rx="2" opacity="0.6"/>
  <rect x="80" y="143" width="40" height="5" fill="#e91e8c" rx="2" opacity="0.6"/>
  <rect x="140" y="143" width="40" height="5" fill="#e91e8c" rx="2" opacity="0.6"/>
  <rect x="200" y="143" width="40" height="5" fill="#e91e8c" rx="2" opacity="0.6"/>
  <rect x="260" y="143" width="40" height="5" fill="#e91e8c" rx="2" opacity="0.6"/>

  <!-- Van body -->
  <rect x="40" y="70" width="200" height="65" rx="12" fill="#2d0050"/>
  <rect x="40" y="70" width="200" height="65" rx="12" stroke="#e91e8c" stroke-width="2.5"/>

  <!-- Van roof / cab -->
  <rect x="55" y="48" width="185" height="32" rx="10" fill="#2d0050" stroke="#e91e8c" stroke-width="2.5"/>

  <!-- Front windshield -->
  <rect x="190" y="54" width="40" height="20" rx="5" fill="#9c27b0" opacity="0.7"/>

  <!-- Side windows -->
  <rect x="68" y="54" width="32" height="20" rx="4" fill="#9c27b0" opacity="0.7"/>
  <rect x="110" y="54" width="32" height="20" rx="4" fill="#9c27b0" opacity="0.7"/>
  <rect x="152" y="54" width="32" height="20" rx="4" fill="#9c27b0" opacity="0.7"/>

  <!-- Side door line -->
  <line x1="160" y1="72" x2="160" y2="132" stroke="#e91e8c" stroke-width="1.5" opacity="0.5"/>

  <!-- Door handle -->
  <rect x="148" y="98" width="10" height="4" rx="2" fill="#e91e8c"/>

  <!-- Headlight -->
  <rect x="228" y="85" width="14" height="10" rx="3" fill="#fff9c4"/>
  <rect x="228" y="85" width="14" height="10" rx="3" fill="url(#headlightGlow)" opacity="0.5"/>

  <!-- Tail light -->
  <rect x="40" y="85" width="10" height="8" rx="2" fill="#ff1744" opacity="0.9"/>

  <!-- Wheels -->
  <circle cx="90" cy="133" r="18" fill="#130020" stroke="#e91e8c" stroke-width="3"/>
  <circle cx="90" cy="133" r="9" fill="#2d0050" stroke="#9c27b0" stroke-width="2"/>
  <circle cx="90" cy="133" r="3" fill="#e91e8c"/>

  <circle cx="210" cy="133" r="18" fill="#130020" stroke="#e91e8c" stroke-width="3"/>
  <circle cx="210" cy="133" r="9" fill="#2d0050" stroke="#9c27b0" stroke-width="2"/>
  <circle cx="210" cy="133" r="3" fill="#e91e8c"/>

  <!-- Stars / music notes decoration -->
  <!-- Music note 1 -->
  <text x="262" y="58" font-size="18" fill="#e91e8c" opacity="0.9">♪</text>
  <!-- Music note 2 -->
  <text x="282" y="42" font-size="14" fill="#9c27b0" opacity="0.8">♫</text>
  <!-- Music note 3 -->
  <text x="298" y="60" font-size="11" fill="#e91e8c" opacity="0.6">♩</text>

  <!-- Star sparkles -->
  <text x="14" y="60" font-size="14" fill="#9c27b0" opacity="0.7">✨</text>
  <text x="22" y="38" font-size="10" fill="#e91e8c" opacity="0.5">⭐</text>

  <!-- Van label -->
  <text x="80" y="110" font-size="13" font-family="Arial, sans-serif" font-weight="bold" fill="#e91e8c" letter-spacing="1">טרמפ 13.5 🎵</text>

  <!-- Speed lines -->
  <line x1="10" y1="90" x2="38" y2="90" stroke="#e91e8c" stroke-width="2" opacity="0.4"/>
  <line x1="6" y1="100" x2="38" y2="100" stroke="#9c27b0" stroke-width="1.5" opacity="0.3"/>
  <line x1="12" y1="110" x2="38" y2="110" stroke="#e91e8c" stroke-width="1" opacity="0.25"/>

  <defs>
    <radialGradient id="headlightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
